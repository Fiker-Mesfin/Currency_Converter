<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Exchange</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>💱 Currency Exchange</h1>

      <form>
        <input id="amount" type="number" placeholder="Amount" required />

        <div class="currency-row">
          <select id="from">
            <option value="USD">USD</option>
            <option value="INR">INR</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
          </select>

          <span>→</span>

          <select id="to">
            <option value="INR">INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
          </select>
        </div>

        <input type="submit" value="Convert" />
      </form>

      <div id="result"></div>

      <div id="history">
        <strong>Conversion History:</strong>
      </div>
    </div>

    <script>
      const rates = {
        USD: { USD: 1, INR: 83.12, EUR: 0.92, GBP: 0.78 },
        INR: { USD: 0.012, EUR: 0.011, GBP: 0.0095, INR: 1 },
        EUR: { USD: 1.08, INR: 90.1, GBP: 0.84, EUR: 1 },
        GBP: { USD: 1.28, INR: 107.2, EUR: 1.19, GBP: 1 },
      };

      const historyDiv = document.querySelector("#history");

      const storedHistory =
        JSON.parse(localStorage.getItem("conversionHistory")) || [];

      storedHistory.forEach((conv) => {
        const p = document.createElement("p");
        p.textContent = conv;
        historyDiv.appendChild(p);
      });

      document.querySelector("form").onsubmit = () => {
        const amount = parseFloat(document.querySelector("#amount").value);
        const from = document.querySelector("#from").value;
        const to = document.querySelector("#to").value;

        if (isNaN(amount) || amount <= 0) {
          document.querySelector("#result").innerHTML = "Enter a valid amount!";
          return false;
        }

        const rate = rates[from][to];

        if (rate !== undefined) {
          const converted = amount * rate;
          const result = `${amount} ${from} = ${converted.toFixed(3)} ${to}`;

          document.querySelector("#result").innerHTML = result;

          const history =
            JSON.parse(localStorage.getItem("conversionHistory")) || [];

          history.push(result);

          localStorage.setItem("conversionHistory", JSON.stringify(history));

          const p = document.createElement("p");
          p.textContent = result;
          historyDiv.appendChild(p);
        } else {
          document.querySelector("#result").innerHTML = "Invalid currency!";
        }

        return false;
      };
    </script>
  </body>
</html>
